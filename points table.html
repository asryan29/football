<!DOCTYPE html>
<html>
<head>
<title>Football Tournament Table</title>
<style>
/* Body & Heading */
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    padding:40px;
    position:relative;
}

/* Creator Info Top Right */
.creator-info{
    position:fixed;
    top:10px;
    right:20px;
    font-size:14px;
    background:rgba(0,0,0,0.5);
    padding:5px 10px;
    border-radius:5px;
    color:#fff;
    font-weight:bold;
    z-index:1000;
}

/* Heading */
h1{
    animation: fadeDown 1s ease;
    margin-bottom:20px;
}

/* Table Styling */
table{
    margin:auto;
    border-collapse:collapse;
    width:80%;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
    animation: fadeUp 1.2s ease;
    cursor:pointer;
}
th{
    background:#16a085;
    color:white;
}
th,td{
    padding:12px;
}
.team{
    display:flex;
    align-items:center;
    gap:10px;
}
.team img{
    width:28px;
    height:28px;
}
tr{
    transition:0.3s;
}
tr:hover{
    background:#e8f8f5;
    transform:scale(1.01);
}
tr:nth-child(even){
    background:#f4f6f6;
}

/* Modal Styles */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}
.modal-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:500px;
    text-align:center;
    animation: fadeUp 0.5s ease;
}
.modal-content h2{
    margin-bottom:15px;
}
.modal-content img.logo{
    width:50px;
    height:50px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}
.modal-content img.formation,
.modal-content img.coach{
    width:80%;
    max-width:300px;
    margin:15px auto;
    display:block;
    border-radius:10px;
    object-fit:cover;
}
.close{
    float:right;
    font-size:24px;
    cursor:pointer;
    font-weight:bold;
}

/* Animations */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-40px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="creator-info">Creator: Ryan</div>

<h1>⚽Points Table by Match⚽</h1>

<table>
<tr>
<th>Position</th>
<th>Team</th>
<th>M</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>Pts</th>
</tr>

<tr onclick="showDetails('Santos FC','santos.png','formation1.png','coach1.png')">
<td>1</td>
<td><div class="team"><img src="Santos.png">Santos FC</div></td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>

<tr onclick="showDetails('Manchester United','Manchester.png','formation2.png','coach2.png')">
<td>2</td>
<td><div class="team"><img src="Manchester.png">Manchester United</div></td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>

<tr onclick="showDetails('Barcelona','fc.png','formation3.png','coach3.png')">
<td>3</td>
<td><div class="team"><img src="fc.png">Barcelona</div></td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>

<tr onclick="showDetails('Real Madrid','real.png','formation4.png','coach4.png')">
<td>4</td>
<td><div class="team"><img src="real.png">Real Madrid</div></td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>

<tr onclick="showDetails('Paris-Saint-German','paris.png','formation5.png','coach5.png')">
<td>5</td>
<td><div class="team"><img src="paris.png">Paris-Saint-German</div></td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
<td>0</td>
</tr>

</table>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="teamName">Team Name</h2>
    <img id="teamLogo" class="logo" src="">
    <h4>Formation</h4>
    <img id="formationImg" class="formation" src="">
    <h4>Coach</h4>
    <img id="coachImg" class="coach" src="">
  </div>
</div>

<script>
function showDetails(name, logo, formation, coach){
    document.getElementById('teamName').innerText = name;
    document.getElementById('teamLogo').src = logo;
    document.getElementById('formationImg').src = formation;
    document.getElementById('coachImg').src = coach;
    document.getElementById('modal').style.display = 'flex';
}
function closeModal(){
    document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
